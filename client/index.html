<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simple E-Commerce Store</h1>

<div class="product">
    <h2>Wireless Mouse</h2>
    <p>Price: ₹500</p>
    <button onclick="addToCart('Wireless Mouse',500)">Add to Cart</button>
</div>

<div class="product">
    <h2>Keyboard</h2>
    <p>Price: ₹800</p>
    <button onclick="addToCart('Keyboard',800)">Add to Cart</button>
</div>

<h2>Shopping Cart</h2>

<ul id="cart"></ul>

<p>Total: ₹<span id="total">0</span></p>

<script src="script.js"></script>

</body>
</html>
